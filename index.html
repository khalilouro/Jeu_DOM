<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu - DOM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div id="home-screen" class="screen">
        <div class="hero">
            <h1>Jeu de Puzzle</h1>
            <p>Choisissez un niveau pour commencer l'aventure.</p>
        </div>

        <div class="level-selection">
            <div class="level-card" onclick="startGame(1)">
                <div class="preview" style="background-image: url('asset/image/image1.jpg'); background-size: cover;"></div>
                <div class="info">
                    <h3>Niveau 1</h3>
                    <p>Débutant - 2x2</p>
                </div>
            </div>
            <div class="level-card" onclick="startGame(2)">
                <div class="preview" style="background-image: url('asset/image/image2.png'); background-size: cover;"></div>
                <div class="info">
                    <h3>Niveau 2</h3>
                    <p>Intermédiaire - 3x3</p>
                </div>
            </div>
            <div class="level-card" onclick="startGame(3)">
                <div class="preview" style="background-image: url('asset/image/image3.png'); background-size: cover;"></div>
                <div class="info">
                    <h3>Niveau 3</h3>
                    <p>Expert - 4x3</p>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="top-bar">
            <button onclick="goToHome()" class="btn-back">← Retour</button>
            <h2 id="level-title">Niveau 1</h2>
        </div>
        
        <div class="grid-container">
            <div class="grid" id="puzzle-grid">
                <!-- Les cases seront générées en JS -->
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
